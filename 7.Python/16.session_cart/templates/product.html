<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>상품 목록</h1>
    <ul>
        {% for item in items %}
            <li>{{ item.name }} (가격: {{ item.price }}원) <a href="{{ url_for('add_to_cart', item_id=item.id) }}">카트에 추가</a></li>
        {% endfor %}
    </ul>
    <a href="/cart">장바구니 보기</a>
</body>
</html>
