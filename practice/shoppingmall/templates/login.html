{% extends "base.html" %}

{% block style %}
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&display=swap');

  .login-wrap {
    min-height: calc(100vh - 60px);
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: #f7f7f5;
    font-family: 'Noto Sans KR', sans-serif;
  }

  .login-card {
    width: 100%;
    max-width: 380px;
    background: #ffffff;
    border: 1px solid #e8e8e6;
    border-radius: 12px;
    padding: 2.5rem 2rem;
  }

  .login-header {
    text-align: center;
    margin-bottom: 2rem;
  }

  .login-icon {
    width: 48px;
    height: 48px;
    background: #f0f0ee;
    border-radius: 10px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 1rem;
    font-size: 22px;
  }

  .login-header h2 {
    font-size: 18px;
    font-weight: 500;
    color: #1a1a1a;
    margin: 0 0 0.3rem;
  }

  .login-header p {
    font-size: 13px;
    color: #888;
    margin: 0;
  }

  .form-group {
    margin-bottom: 1rem;
  }

  .form-group label {
    display: block;
    font-size: 13px;
    color: #555;
    margin-bottom: 6px;
    font-weight: 400;
  }

  .form-group input {
    width: 100%;
    padding: 10px 12px;
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    border: 1px solid #e0e0de;
    border-radius: 8px;
    outline: none;
    background: #fafafa;
    color: #1a1a1a;
    box-sizing: border-box;
    transition: border-color 0.15s, background 0.15s;
  }

  .form-group input:focus {
    border-color: #1a1a1a;
    background: #fff;
  }

  .form-group input::placeholder {
    color: #bbb;
  }

  .btn-login {
    width: 100%;
    padding: 11px;
    background: #1a1a1a;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    margin-top: 0.5rem;
    transition: background 0.15s, transform 0.1s;
  }

  .btn-login:hover {
    background: #333;
  }

  .btn-login:active {
    transform: scale(0.98);
  }

  .error-msg {
    font-size: 13px;
    color: #c0392b;
    text-align: center;
    margin-top: 0.75rem;
  }
  form {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-top: 50px;
    }
    .form-title{
        margin: 40px;
    }
    .btn-wrap {
        margin: 45px;
    }
    button {
        margin: 10px;
    }
    a {
        color: white;
        text-decoration: none;
    }
</style>
{% endblock %}

{% block content %}
    {% if user %}
    <form action="#" method="get">
            <h2 class="form-title">👋🏻 환영합니다!</h2>
            <h3>환영합니다, {{ user.name }}님! 로그인에 성공하셨습니다.</h3>
            <div class="btn-wrap">
                <button type="button" class="btn btn-danger"><a href="{{ url_for('logout') }}">로그아웃</a></button>
                <button type="button" class="btn btn-dark"><a href="{{ url_for('product') }}">상품 보기</a></button>
            </div>
        </form>
    {% else %}
    <div class="login-wrap">
    <div class="login-card">
        <div class="login-header">
        <div class="login-icon">🔐</div>
        <h2>로그인</h2>
        <p>계정에 로그인하세요</p>
        </div>

        <form action="{{ url_for('login') }}" method="post">
        <div class="form-group">
            <label for="id">아이디</label>
            <input type="text" id="id" name="id" placeholder="아이디를 입력하세요" required />
        </div>

        <div class="form-group">
            <label for="pw">비밀번호</label>
            <input type="password" id="pw" name="pw" placeholder="비밀번호를 입력하세요" required />
        </div>

        <button type="submit" class="btn-login">로그인</button>
        </form>
        {% if error %}
        <p class="error-msg">{{ error }}</p>
        {% endif %}
        </div>
    </div>
    {% endif %}
{% endblock %}
