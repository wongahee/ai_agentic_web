<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>카드 3개 레이아웃</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

  <div class="max-w-6xl mx-auto p-6 grid grid-cols-1 md:grid-cols-3 gap-6">

    <!-- 카드 1 -->
    <div class="bg-white rounded-2xl shadow-md p-6 hover:shadow-xl transition">
      <img src="https://via.placeholder.com/400x200" alt="card1" class="rounded-lg mb-4">
      <h2 class="text-xl font-semibold mb-2">카드 제목 1</h2>
      <p class="text-gray-600 mb-4">이곳에 카드 설명을 넣을 수 있습니다.</p>
      <button class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600">
        자세히 보기
      </button>
    </div>

    <!-- 카드 2 -->
    <div class="bg-white rounded-2xl shadow-md p-6 hover:shadow-xl transition">
      <img src="https://via.placeholder.com/400x200" alt="card2" class="rounded-lg mb-4">
      <h2 class="text-xl font-semibold mb-2">카드 제목 2</h2>
      <p class="text-gray-600 mb-4">이곳에 카드 설명을 넣을 수 있습니다.</p>
      <button class="bg-green-500 text-white px-4 py-2 rounded-lg hover:bg-green-600">
        자세히 보기
      </button>
    </div>

    <!-- 카드 3 -->
    <div class="bg-white rounded-2xl shadow-md p-6 hover:shadow-xl transition">
      <img src="https://via.placeholder.com/400x200" alt="card3" class="rounded-lg mb-4">
      <h2 class="text-xl font-semibold mb-2">카드 제목 3</h2>
      <p class="text-gray-600 mb-4">이곳에 카드 설명을 넣을 수 있습니다.</p>
      <button class="bg-purple-500 text-white px-4 py-2 rounded-lg hover:bg-purple-600">
        자세히 보기
      </button>
    </div>

  </div>

</body>
</html>
