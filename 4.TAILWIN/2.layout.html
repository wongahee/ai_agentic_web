<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
  <h1 class="text-3xl font-bold">버튼들</h1>
  <div class="p-4 space-y-4">
    <!-- 
    배경색: bd-{color}-{number}, bg-transparent, bg-white, bg-black 
    글자색: text-{color}-{number}, text-transparent, text-white, text-black
           text-{sm/md/lg/xl}
    * top/bottom/right/left
    테두리: border border-{color}-{number}
           border-t border-b border-l border-r
           rounded-{lg/full}
           shadow-{md/lg}
    여백: m-{number} / p-{number}
    mt-{number} / mb-{number} / mr-{number} ml-{number} 
    mx-{number} / my-{number} 좌우/상하
    -->

    <p class="text-red-900 border border-blue-500 m-4 p-4 rounded-full shadow-lg">빨간색 글자</p>
    <p class="text-red-800 border border-blue-400 ml-4 pl-8">빨간색 글자</p>
    <p class="text-red-700 border border-blue-300 ml-6 pl-6">빨간색 글자</p>
    <p class="text-red-600 border border-yellow-500 ml-8 pl-4">빨간색 글자</p>
    <p class="text-red-500 border border-yellow-600">빨간색 글자</p>
    <p class="text-red-400 border border-yellow-700">빨간색 글자</p>
    <p class="text-red-300">빨간색 글자</p>

    <button class="bg-blue-500 hover:bg-blue-700 py-2 px-4 rounded font-bold text-white">버튼 1</button>
    <button class="bg-blue-400 hover:bg-blue-600 py-2 px-4 rounded font-bold text-white">버튼 1</button>
    <button class="bg-blue-300 hover:bg-blue-500 py-2 px-4 rounded font-bold">버튼 1</button>
    <button class="bg-blue-200 hover:bg-blue-400 py-2 px-4 rounded font-bold">버튼 1</button>
    <button class="bg-blue-100 hover:bg-blue-300 py-2 px-4 rounded font-bold">버튼 1</button>
  </div>
  <div class="p-4 space-y-4">
    <button class="bg-green-500 hover:bg-green-700 py-2 px-4 rounded font-bold text-white">버튼 1</button>
    <button class="bg-green-400 hover:bg-green-600 py-2 px-4 rounded font-bold text-white">버튼 1</button>
    <button class="bg-green-300 hover:bg-green-500 py-2 px-4 rounded font-bold">버튼 1</button>
    <button class="bg-green-200 hover:bg-green-400 py-2 px-4 rounded font-bold">버튼 1</button>
    <button class="bg-green-100 hover:bg-green-300 py-2 px-4 rounded font-bold">버튼 1</button>
  </div>
  <div class="p-4 space-y-4">
    <button class="bg-red-500 hover:bg-red-700 py-2 px-4 rounded  font-bold text-white">버튼 1</button>
    <button class="bg-red-400 hover:bg-red-600 py-2 px-4 rounded  font-bold text-white">버튼 1</button>
    <button class="bg-red-300 hover:bg-red-500 py-2 px-4 rounded font-bold">버튼 1</button>
    <button class="bg-red-200 hover:bg-red-400 py-2 px-4 rounded font-bold">버튼 1</button>
    <button class="bg-red-100 hover:bg-red-300 py-2 px-4 rounded font-bold">버튼 1</button>
  </div>
</body>
</html>
