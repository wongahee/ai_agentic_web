<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
  <div class="container mx-auto p-4">
    <h1 class="text-2xl">그리드/반응형</h1>

    <!-- 평소 1열, md 사이즈 시 2열, lg 사이즈일때 4열 -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-4">
        <div class="bg-blue-500 p-4 text-white">컬럼 1</div>
        <div class="bg-green-500 p-4 text-white">컬럼 2</div>
        <div class="bg-red-500 p-4 text-white">컬럼 3</div>
        <div class="bg-yellow-500 p-4 text-white">컬럼 4</div>
    </div>
     <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 mb-4">
        <div class="bg-purple-500 p-4 text-white">컬럼 5</div>
        <div class="bg-pink-500 p-4 text-white">컬럼 6</div>
        <div class="bg-indigo-500 p-4 text-white">컬럼 7</div>
        <div class="bg-sky-500 p-4 text-white">컬럼 8</div>
    </div>

  </div>
</body>
</html>
