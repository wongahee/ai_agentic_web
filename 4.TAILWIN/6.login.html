<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>로그인</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black min-h-screen flex items-center justify-center">

  <div class="bg-gray-800 p-8 rounded-2xl shadow-xl w-full max-w-sm">
    <h2 class="text-white text-2xl font-bold mb-6 text-center">Login</h2>

    <!-- ID 입력 -->
    <div class="mb-4">
      <label class="block text-gray-300 mb-2">ID</label>
      <input 
        type="text" 
        placeholder="아이디 입력"
        class="w-full px-4 py-2 rounded-lg bg-gray-700 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-gray-500"
      />
    </div>

    <!-- PW 입력 -->
    <div class="mb-6">
      <label class="block text-gray-300 mb-2">Password</label>
      <input 
        type="password" 
        placeholder="비밀번호 입력"
        class="w-full px-4 py-2 rounded-lg bg-gray-700 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-gray-500"
      />
    </div>

    <!-- 버튼 -->
    <button class="w-full bg-gray-600 hover:bg-gray-500 text-white py-2 rounded-lg transition">
      로그인
    </button>
  </div>

</body>
</html>
