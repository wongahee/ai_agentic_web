<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <title>Document</title>
    <style>
        .nav-bar {
            background-color: rgb(232, 232, 232);
            padding: 5px;
            display: flex;
        }
        .nav-bar ul {
            list-style-type: none;
            display: flex;
            margin: 0;
            padding: 0;
        }
        .nav-bar ul li {
            margin: 20px;
        }
        .nav-bar ul li a {
            color: black;
            text-decoration: none;
        }
        .nav-bar ul li a.disabled {
            color: #99999980;
        }
    </style>
    {% block style %}{% endblock %}
</head>
<body>
    <div class="nav-bar">
        <h3>Navbar</h3>
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/login" class="disabled">Login</a></li>
            <li><a href="/product" class="disabled">Product</a></li>
            <li><a href="/cart" class="disabled">Cart</a></li>
        </ul>
    </div>
    {% block content %}{% endblock %}
</body>
</html>
