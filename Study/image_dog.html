<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- 1. 버튼 클릭 시, 화면에 랜덤 이미지 출력 https://dog.ceo/ 
         2. 강아지 품종을 선택하여 이미지 출력 
    -->
    <h1> [DOG CEO] Random Image</h1>
    <p>Choose a main breed:</p><select></select>
    <p>Choose a sub-breed:</p><select></select>
    <button id="loadBtn">강아지 이미지 로딩</button>
    <div id="result"></div>

    <script>
        document.getElementById('loadBtn').addEventListener('click', () => {
            fetch('https://dog.ceo/api/breeds/image/random')
            .then((response) => response.json())
            .then((data) => {
                if (data.status == "success") {
                    const resultDiv = document.getElementById('result');
                    resultDiv.innerHTML = `<img src="${data.message}">`;
                } else{
                    displayError(data)
                }
                console.log(data, "화면에 DOM 그리기");
                const resultDiv = document.getElementById('result');
                resultDiv.innerHTML = `<img src="${data.message}">`;
            })
            .catch(error => {
                console.error("알 수 없는 오류", error);
                displayError(data)
            });

            function displayError(data) {
                const resultDiv = document.getElementById('result');
                resultDiv.innerHTML = `<p>이미지를 불러올 수 없습니다.</p>`;
            }
        });
    </script>
</body>
</html>
