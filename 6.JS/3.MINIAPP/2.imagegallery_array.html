<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>이미지 갤러리</h1>
    <div class="gallery">
        <img id="img1" src="images/movie1.jpg" width="200px">
        <img id="img2" src="images/movie2.jpg" width="200px">
        <img id="img3" src="images/movie3.jpg" width="200px">
    </div>

    <!-- 방법 1 -->
     <img id="large-image" src="images/movie1.jpg">

     <script>
        const img1 = document.getElementById('img1');
        const img2 = document.getElementById('img2');
        const img3 = document.getElementById('img3');

        const imgs = [img1, img2, img3];

        imgs.forEach((img) => {
            img.addEventListener('click', () => {
            const large = document.getElementById('large-image');
            large.src = img.src;
            large.width = '400';
            }); 
        });
     </script>
</body>
</html>
