<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        input {
            padding: 10px;
            font-size: 16px;
        }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            padding: 5px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <h1>실시간 검색 필터</h1>
    <input type="text" id="searchInput" placeholder="검색어 입력하기">
    <ul id="itemList">
        <li>Apple</li>
        <li>Orange</li>
        <li>Banana</li>
        <li>Kiwi</li>
        <li>Graph</li>
        <li>Cherry</li>
        <li>Pear</li>
        <li>Pineapple</li>
        <li>Strawberry</li>
        <li>Blueberry</li>
        <li>Watermelon</li>
        <li>Melon</li>
        <li>Mango</li>
        <li>Peach</li>
        <li>Lemon</li>
        <li>Plum</li>
        <li>Dragonfruits</li>
        <li>Lime</li>
    </ul>

    <script>
        const searchInput = document.getElementById('searchInput');
        // Nodelist type으로 변경
        const items = document.querySelectorAll('#itemList > li');

        searchInput.addEventListener('keyup', () => {
            const filter = searchInput.value.toLowerCase();
        
            items.forEach((item) => {
                const text = item.textContent;
                // if문: 조건문 ? yes : no
                text.toLowerCase().includes(filter) ?
                    item.style.display = '' : item.style.display = 'none';

                // item.style.display = item.text.toLowerCase().includes(filter) ? '' : 'none';
            })
        });
    </script>
</body>
</html>
