<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #dragItem {
            width: 100px;
            height: 100px;
            background-color: #ffcc00;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1;
        }

        .dropContainer {
            width: 200px;
            height: 200px;
            background-color: #f0f0f0;
            border: 2px dashed #cccccc;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin-bottom: 20px;
        }

        .placeholder {
            position: absolute;
            color: #999;
        }
    </style>
</head>
<body>
    <!-- dragItem 요소를 옮기기 -->
    <div id="startZone" class="dropContainer">
        <span class="placeholder" id="startPlaceholder">Drop Here</span>
        <div id="dragItem" draggable="true">Drag Me</div>
    </div>

    <div id="dropZone" class="dropContainer">
        <span class="placeholder" id="dropPlaceholder">Drop Here</span>
    </div>
    <script>
        const dragItem = document.getElementById('dragItem');
        const startZone = document.getElementById('startZone');
        const dropZone = document.getElementById('dropZone');

        dragItem.addEventListener('dragstart', () => {
            console.log('Drag Started');
        });

        [startZone, dropZone].forEach((zone) => {
            zone.addEventListener('dragover', (ev) => {
                ev.preventDefault();
                console.log('위에 있음');
            });
        });

        [startZone, dropZone].forEach((zone) => {
            zone.addEventListener('drop', (ev) => {
                ev.preventDefault();
                console.log('Zone에 놓았음');
                zone.appendChild(dragItem);
            });
        });
    </script>
</body>
</html>
