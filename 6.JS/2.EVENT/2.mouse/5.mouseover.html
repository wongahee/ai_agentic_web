<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #mybutton {
            width: 200px;
            height: 100px;
            background-color: lime;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="mybutton">우클릭하시오</div>
    <script>
        document.getElementById('mybutton').addEventListener('mouseover', () => {
            console.log('마우스 올라감');
        });

        document.getElementById('mybutton').addEventListener('mouseout', () => {
            console.log('마우스 나감');
        });

        document.getElementById('mybutton').addEventListener('mousemove', (event) => {
            console.log(`마우스 정보: ${event.clientX}:${event.clientY}`);
        });
    </script>
</body>
</html>
