<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>외부 요청 테스트</h1>
    <button id="loadBtn">데이터 요청</button>
    <div id="result"></div>
    <script>
        document.getElementById('loadBtn').addEventListener('click', () => {
            fetch('http://jsonplaceholder.typicode.com/users/1')
            .then((response) => response.json())
            .then((data) => {
                console.log(data);
                const resultDiv = document.getElementById('result');
                resultDiv.innerHTML = `
                    <ul>
                        <li>사용자 ID: ${data.id}</li>
                        <ul>
                            <li>이름: ${data.name}</li>
                            <li>전화번호: ${data.phone}</li>
                            <li>웹사이트: ${data.url}</li>
                        </ul>
                    </ul>
                `;
            })
            .catch((error) => {
                console.log("위 fetch 처리/가공 중 오류 발생", error)
            })
        });
    </script>
</body>
</html>
