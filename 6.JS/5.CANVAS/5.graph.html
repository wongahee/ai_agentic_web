<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        canvas {
            border: 2px solid rgb(255, 145, 0);
        }
    </style>
</head>
<body>
    <canvas id="graphCanvas" width="400" height="200"></canvas>
    <script>
        const canvas = document.getElementById('graphCanvas');
        const context = canvas.getContext('2d');

        const graphData = {
            A: 10,
            B: 20,
            C: 40,
            D: 60,
            E: 100
        }

        let startX = 50;
        const barHeightOffset = 20;
        
        drawBarGraph(graphData);

        function drawBarGraph(data) {
            const barWidth = 30;
            
            for (const key in data) {
                const barHeight = data[key];
                context.fillStyle = 'blue';
                context.fillRect(startX, canvas.height - barHeightOffset - barHeight, barWidth, data[key]);
                context.fillStyle = 'black';
                context.fillText(key, startX + barWidth / 2, canvas.height - 1);
                startX += 50;
            }
        }
    </script>
</body>
</html>
