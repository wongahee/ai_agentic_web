<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        canvas {
            border: 1px solid #000;
        }
    </style>
</head>
<body>
    <canvas id="myCanvas" width="400px" height="300px"></canvas>
    <script>
        const canvas = document.getElementById('myCanvas');
        const context = canvas.getContext('2d');

        // 1. 사각형 그리기
        context.fillStyle = '#ff0000';
        context.fillRect(50, 50, 200, 100);  // x, y, width, height

        context.fillStyle = '#0000ff';
        context.fillRect(50, 150, 200, 100);

        // 2. 라인 그리기
        context.strokeStyle = '#00ff00';
        context.lineWidth = 2;
        context.beginPath();
        context.moveTo(150, 50);    // 출발점
        context.lineTo(250, 150);
        context.lineTo(150, 250);
        context.lineTo(50, 150);
        context.lineTo(150, 50);
        context.stroke();         // 실제로 그리기
        context.closePath();

        // 3. 원 그리기
        context.fillStyle = '#ffff00';
        context.beginPath();
        context.arc(350, 50, 30, 0, 2 * Math.PI);  // x, y, radius(반지름), 출발 각도, 끝각도(360=2pi)
        context.fill();
        context.closePath();

        context.fillStyle = '#000';
        context.beginPath();
        context.arc(350, 150, 30, 1/2 * Math.PI, 3/2 * Math.PI);
        context.fill();
        context.closePath();

        // 출발 각도
        // 0 = 0도 (3시 방향)
        // 1/2 PI = 90도 (12시 방향)
        // 1 PI = 180도 (9시 방향)
        // 3/2 PI = 270도 (6시 방향)
        // 2 PI = 360도 (3시 방향)
    </script>
</body>
</html>
