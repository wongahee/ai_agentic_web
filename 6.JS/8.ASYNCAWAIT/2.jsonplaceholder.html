<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>외부 요청 테스트</h1>
    <button id="loadBtn">데이터 요청</button>
    <div id="result"></div>
    <script>
        document.getElementById('loadBtn').addEventListener('click', async() => {
            try {    
                const response = await fetch('http://jsonplaceholder.typicode.com/todos/1');
            
                if(!response.ok) {
                    console.log("성공적인 응답이 왔음. 응답은 여기 담겨있음: ", response)
                    throw new Error("알 수 없는 오류가 발생했습니다.")
                }
                console.log("성공적인 응답이 왔음. 응답은 여기 담겨있음: ", response)
                const data = await response.json();

            } catch(error) {
                console.log("최종 파싱이 끝난 JSON 자료구조가 넘어옴: ", data)
                // fetch와 차이점: async, await / try, catch문 추가
            }
        });
    </script>
</body>
</html>
