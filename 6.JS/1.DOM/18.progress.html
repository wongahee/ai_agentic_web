<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #progressBar {
            width: 100%;
            background-color: #fff672;
        }
        #progress {
            width: 2px;
            height: 30px;
            background-color: rgb(255, 145, 0);
        }
        #progressText {
            position: absolute;
            width: 100%;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>프로그래스바</h1>
    <input type="number" id="timeInput" placeholder="초를 입력하세요." min="1" max="10">
    <button onclick="startProgress()" id="startButton">시작</button>
    <button onclick="clearProgress()">초기화</button>
    <div id="progressBar">
        <div id="progress"><span id="progressText">0%</span></div>
    </div>

    <script>
        let interval;
        let timerId;
        const timeInput = document.getElementById('timeInput');
        const progress = document.getElementById('progress');  // 진행률 바
        const progressText = document.getElementById('progressText');
        const startButton = document.getElementById('startButton');

        function startProgress() {
            duration = parseInt(timeInput.value);
            console.log('입력초: ' + duration);
            startButton.disabled = true;

            // 초과시간 변수 지정 elapsed
            let elapsed = 0;
            timerId = setInterval(() => {
                // console.log('반복 호출');
                elapsed++;
                const ratio = Math.floor((elapsed / duration) * 100); // 진행률 계산
                progress.style.width = `${ratio}%`;
                progressText.textContent = `${ratio}%`;

                // 타이머 중지
                if (ratio >= 100) {
                    clearInterval(timerId)
                    startButton.disabled = false;
                }
            }, 1000);   // 1초마다 반복
        }

        function clearProgress() {
            if(timerId) clearInterval(timerId);
            progress.style.width = '2px';
            timeInput.value = '';    // 입력값 초기화
            progressText.textContent = '0%';
            startButton.disabled = false;
        }
    </script>
</body>
</html>
