<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #mydiv {
            display: none;
            width: 200px;
            height: 200px;
            background-color: lightsalmon;
        }
    </style>
</head>
<body>
    <h1>Show / Hide</h1>
    <button onclick="showhide()">숨겨진 요소 토글</button>
    <div id="mydiv">이것은 숨겨진 Div 요소입니다.</div>
    <script>
        // 첫 클릭 시 두 번 클릭해야 요소가 생기는 버그
        // 문제 원인은 DOM에는 CSS 내용이 들어가지 않음.
        // 그래서 style을
        function showhide_withbug() {
            // const div = document.getElementById('mydiv');
            const div = document.querySelector('#mydiv');
            // console.log(div);
            if (div.style.display == 'none') {
                div.style.display = 'block';
            } else {
                div.style.display = 'none';
            }
        }

        // 방법 1.
        function showhide2_bugfix1() {
            const div = document.querySelector('#mydiv');
            // console.log(div);
            if (div.style.display == 'block') {
                div.style.display = 'none';
            } else {
                div.style.display = 'block';
            }
        }

        // 방법 2.
        // 실제 style까지 적용된 결과로 연산
        // 실무적으로 많이 사용하지는 않음
        function showhide3_bugfix2() {
            const div = document.querySelector('#mydiv');
            const displayStyle = window.getComputedStyle(div).display;
            // css가 적용된 결과를 가져옴
            
            if (displayStyle == 'none') {
                div.style.display = 'block';
            } else {
                div.style.display = 'none';
            }
        }
    </script>
</body>
</html>
