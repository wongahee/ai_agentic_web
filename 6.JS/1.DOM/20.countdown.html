<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>


    </style>
</head>
<body>
    <h1>카운트다운</h1>
    <input type="number" id="timeInput" placeholder="초를 입력하세요" min="1" max="10">
    <button onclick="startTimer()" id="startButton">시작</button>
    <div>
        <p id="timerDisplay"></p>
    </div>

    <script>
        function startTimer() {
            let inputValue = parseInt(document.getElementById('timeInput').value);
            const timerDisplay = document.getElementById('timerDisplay');
            const startButton = document.getElementById('startButton');

            startButton.disabled = true;

            const timerId = setInterval(()=> {  
                if(inputValue <= 0) {
                    clearInterval(timerId);
                    timerDisplay.textContent = "시간이 종료되었습니다.";
                    startButton.disabled = false;
                } else {
                    timerDisplay.textContent = `${inputValue}초가 남았습니다.`;
                    inputValue--;
                }
            }, 1000)
        }
    </script>
</body>
</html>
