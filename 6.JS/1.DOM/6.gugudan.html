<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>구구단</title>
</head>
<body>
    <h1>구구단 출력기</h1>
    <input type="text" placeholder="단을 입력하세요. (예: 2)" id="input">
    <button onclick="printGugudan()">출력하기</button>
    <div id="result">
        <!-- 결과가 출력될 위치 -->
    </div>

    <script>
        // input box의 입력값 가져오기
        function printGugudan() {
            // console.log('버튼 클릭 동작확인');
            const userInput = document.getElementById('input'); // DOM 반환값
            const userInputValue = userInput.value; // DOM이 갖고있는 값

            // 위 두 문장을 한 줄로
            // const userValue = document.getElementById('input').value;
            
            console.log(userInputValue);
            // console.log(userValue);

            // 문자열 숫자 -> 숫자로 변경
            const userInputValueNumber = parseInt(userInputValue);

            // 입력값 검증하기
            if (isNaN(userInputValue)) {
                const result = document.getElementById('result');
                result.innerHTML = '<h3> 숫자만 입력하세요. </h3>';
                return;
            }

            if (userInputValueNumber < 1 || userInputValueNumber > 9) {
                const result = document.getElementById('result');
                result.innerHTML = '<h3> 1 ~ 9까지의 숫자만 입력하세요. </h3>';
                return;
            }

            // 출력값 만들기
            const result = document.getElementById('result');
            console.log(result);
            result.innerHTML = '<h3>' + userInputValue + '단</h3>';

            for (let i = 1; i <= 9; i++) {
                // result.innerHTML += userInputValue + ' x ' + i + ' = ' + userInputValue * i + '<br>'; 
                result.innerHTML += `${userInputValue} x ${i} = ${userInputValue * i} <br>`;
            }
        }
    </script>
</body>
</html>
