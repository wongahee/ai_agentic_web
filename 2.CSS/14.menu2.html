<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
            display: flex;
            border: 1px solid #555;
        }

        li {
            /* flex 영역 채우기 */
            flex: 1; 
            width: 100px;
            text-align: center;
        }

        li a {
            display: block;
            text-decoration: none;
        }

        li a:hover {
            background-color: #222;
            color: white;
        }
    </style>
</head>
<body>
    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">News</a></li>
        <li><a href="#">Contact</a></li>
        <li><a href="#">About</a></li>
    </ul>
</body>
</html>
