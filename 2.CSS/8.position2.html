<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .bg {
            height: 300px;
            background-color: rgb(95, 14, 170);
        }

        .center {
            background-color: #fff;
        }

        .fixed {
            width: 100px;
            height: 100px;
            background-color: white;
            background-image: url(images/fam.jpg);
            background-size: 100% 100%;
            position: fixed;
            bottom: 50px;
            right: 50px;
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="bg center"></div>
    <div class="bg"></div>
    <div class="fixed"></div>
    <script>
        const elem = document.querySelector('fixed');

        elem.onclick = () => {
            elem.style.transform = elem.style.transform === 'scale (0.2)' ?
            'scale(1)' : 'scale(2.0)';
        }
    </script>
</body>
</html>
