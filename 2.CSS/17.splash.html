<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;

            background: #000;
            color: #fff;
            font-size: 2em;

            display: flex;
            justify-content: center;
            align-items: center;

            z-index: 1000;
            animation: fadeOut 1s ease-in-out 3s forwards;
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                visibility: hidden;
            }
        }

        .content {
            opacity: 0;
            animation: fadeIn 1s ease-in-out 4s forwards;
            padding: 20px;
        }

        @keyframes fadeIn {
        to {
                opacity: 1;
            }

        }
    </style>
</head>
<body>
    <div class="splash">로딩중</div>
    <div class="content">
        <h1>Welcome</h1>
        <p>여기는 메인컨텐츠 영역입니다.</p>
    </div>
</body>
</html>
