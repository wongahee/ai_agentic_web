<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
            width: 100px;
            height: 100px;
            background-color: skyblue;
            position: relative;

            animation-name: moveLeft; /* 내가 정한 키 프레임명 */
            animation-duration: 2s;
            animation-iteration-count: 2;  /* 애니매이션 반복 횟수 */
            animation-direction: alternate;
            animation-timing-function: linear; /* 움직임 속도 균일성 */
        }

        /* 내가 정한 키프레임명 */
        @keyframes moveLeft {
            0% {
                left: 0;
            }
            100% {
                left: 200px;
            }
        }

        .text {
            color: black;
            animation-name: fadeOut;
            animation-duration: 1.5s;
            animation-delay: 2s;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
        }

        @keyframes fadeOut {
            0% {
                opacity: 1;
            }
            100% {
                opacity: 0;
            }
        }

        .circle{
            width: 100px;
            height: 100px;
            background-color: cornflowerblue;
            border-radius: 20%;

            animation-name: rotateAndScale;
            animation-duration: 3s;
            animation-iteration-count: infinite;
        }

        @keyframes rotateAndScale {
            0% {
                transform: rotate(0deg) scale(1);
            }
            50% {
                transform: rotate(180deg) scale(1.5);
            }
            100% {
                transform: rotate(360deg) scale(1);
            }
        }

        .image {
            width: 300px;
            height: 300px;

            animation-name: shake;
            animation-duration: 0.5s;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
        }

        @keyframes shake {
            0% {
                transform: translateX(0);
            }
            25% {
                transform: translateX(-10px) rotate(-5deg);
            }
            75% {
                transform: translateX(10px) rotate(5deg);
            }
            100% {
                transform: translateX(0);
            }
        }
    </style>
</head>
<body>
    <div class="box"></div>
    <hr>
    <p class="text">페이드아웃 글자 효과</p>
    <hr>
    <div class="circle"></div>
    <hr>
    <img class="image" src="images/fam.jpg">
</body>
</html>
