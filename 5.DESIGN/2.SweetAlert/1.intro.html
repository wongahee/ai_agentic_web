<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <title>Document</title>
</head>
<body>
    <h1>간단한 Alert 테스트</h1>

    <button onclick="inputPrompt()">버튼</button>

    <script>
        // 첫 번째 방법
        function showAlert() {
            // console.log("버튼 클릭됨");
            // alert은 현재 거의 사용되지 않음.
            // alert('이것은 표준 경고창입니다.');
            Swal.fire({
                title: '안녕하세요',
                text: '이것은 Sweet Alert의 경고창입니다.',
                icon: 'question', // icon 종류: success, error, warning, info
                confirmButtonText: '확인'
            })
        }

        // 두 번째 방법
        function basicAlert() {
            Swal.fire('안녕하세요', '이것은 Sweet Alert의 경고창입니다.', 'error');
        }

        // 취소 버튼과 처리로직 설계하기
        function comfirmAlert() {
            Swal.fire({
                title: '정말 삭제하겠습니까?',
                text: '이 작업은 되돌릴 수 없습니다.',
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: '삭제',
                cancelButtonText: '취소'
            }).then((result) => {
                console.log(result);
                if (result.isConfirmed) {
                    Swal.fire('삭제 완료', '항목이 삭제되었습니다.', 'success');
                }else {
                    Swal.fire('취소됨', '데이터는 그대로 유지됩니다.', 'info');
                }
            })
        }

        function inputPrompt(){
            Swal.fire({
                title: '이름을 입력하세요.',
                input: 'text',
                inputPlaceholder: '여기에 입력하세요...',
                showCancelButton: true,
                confirmButtonText: '제출',
                cancelButtonText: '취소'
            }).then((result) => {
                // console.log(result);
                if(result.isConfirmed && result.value) {
                    Swal.fire(`입력한 값: ${result.value}`);
                }
            })
        }
    </script>
</body>
</html>
