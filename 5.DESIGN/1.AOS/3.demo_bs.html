<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bootstrap AOS Demo</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- AOS -->
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

  <style>
    body {
      background-color: #000;
      color: #fff;
    }
    section {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
  </style>
</head>

<body>

  <!-- HERO -->
  <section class="text-center" style="background: linear-gradient(135deg, #4c1d95, #000);">
    <h1 class="display-4 fw-bold" data-aos="zoom-in">
      Scroll Down 👇
    </h1>
  </section>

  <!-- SECTION 1 -->
  <section class="text-center">
    <h2 class="mb-5" data-aos="fade-up">Fade Animations</h2>

    <div class="container">
      <div class="row g-4 justify-content-center">
        <div class="col-md-3" data-aos="fade-up">
          <div class="bg-secondary rounded-4 p-5"></div>
        </div>
        <div class="col-md-3" data-aos="fade-down">
          <div class="bg-secondary rounded-4 p-5"></div>
        </div>
        <div class="col-md-3" data-aos="fade-left">
          <div class="bg-secondary rounded-4 p-5"></div>
        </div>
        <div class="col-md-3" data-aos="fade-right">
          <div class="bg-secondary rounded-4 p-5"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- SECTION 2 -->
  <section style="background-color:#111;" class="text-center">
    <h2 class="mb-5" data-aos="flip-left">Flip Animations</h2>

    <div class="d-flex gap-4">
      <div class="bg-danger rounded-4" style="width:150px;height:150px;" data-aos="flip-left"></div>
      <div class="bg-primary rounded-4" style="width:150px;height:150px;" data-aos="flip-right"></div>
      <div class="bg-success rounded-4" style="width:150px;height:150px;" data-aos="flip-up"></div>
    </div>
  </section>

  <!-- SECTION 3 -->
  <section class="text-center">
    <h2 class="mb-5" data-aos="zoom-in">Zoom Effects</h2>

    <div class="container">
      <div class="row g-4 justify-content-center">
        <div class="col-md-3" data-aos="zoom-in">
          <div class="bg-warning rounded-4" style="height:150px;"></div>
        </div>
        <div class="col-md-3" data-aos="zoom-in-up">
          <div class="bg-danger rounded-4" style="height:150px;"></div>
        </div>
        <div class="col-md-3" data-aos="zoom-out">
          <div class="bg-info rounded-4" style="height:150px;"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- SECTION 4 -->
  <section style="background-color:#111;" class="text-center">
    <h2 class="mb-5" data-aos="fade-right">Delay Example</h2>

    <div class="d-flex gap-3">
      <div class="bg-purple rounded-3" style="width:80px;height:80px;background:#9333ea;" data-aos="fade-up" data-aos-delay="0"></div>
      <div class="bg-purple rounded-3" style="width:80px;height:80px;background:#a855f7;" data-aos="fade-up" data-aos-delay="200"></div>
      <div class="bg-purple rounded-3" style="width:80px;height:80px;background:#c084fc;" data-aos="fade-up" data-aos-delay="400"></div>
      <div class="bg-purple rounded-3" style="width:80px;height:80px;background:#ddd6fe;" data-aos="fade-up" data-aos-delay="600"></div>
    </div>
  </section>

  <!-- SECTION 5 -->
  <section class="text-center">
    <h2 class="mb-5" data-aos="fade-up">Slow Motion 느낌</h2>

    <div class="d-flex flex-column gap-4">
      <div class="bg-info rounded-4" style="width:300px;height:80px;" data-aos="fade-right" data-aos-duration="1500"></div>
      <div class="bg-info rounded-4" style="width:300px;height:80px;" data-aos="fade-left" data-aos-duration="2000"></div>
      <div class="bg-info rounded-4" style="width:300px;height:80px;" data-aos="fade-up" data-aos-duration="2500"></div>
    </div>
  </section>

  <!-- FOOTER -->
  <section style="background: linear-gradient(135deg,#000,#4c1d95);" class="text-center">
    <h2 class="display-5" data-aos="zoom-in-up">
      The End 🚀
    </h2>
  </section>

  <script>
    AOS.init({
      duration: 1000,
      once: false
    });
  </script>

</body>
</html>
