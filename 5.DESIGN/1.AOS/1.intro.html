<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <title>Document</title>
    <style>
        body {
            /* 강제 스크롤을 위한 공간 */
            height: 2000px;
            padding: 50px;
        }

        .box {
            margin: 100px 0;
            padding: 40px;
            background: #f5b9eb;
            border: 2px solid #ff00bfcb;
            text-align: center;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <h1>스크롤하면서 등장하는 요소들</h1>
    <div class="box" data-aos="fade-up">첫번째 박스</div>
    <div class="box" data-aos="fade-right">두번째 박스</div>
    <div class="box" data-aos="zoom-in">세번째 박스</div>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
        AOS.init();
    </script>
</body>
</html>
