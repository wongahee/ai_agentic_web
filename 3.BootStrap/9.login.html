<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bootstrap Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark d-flex align-items-center justify-content-center vh-100">

  <div class="card bg-secondary text-white p-4 rounded-4 shadow" style="width: 350px;">
    <h2 class="text-center mb-4">Login</h2>

    <!-- ID -->
    <div class="mb-3">
      <label class="form-label">ID</label>
      <input type="text" class="form-control bg-dark text-white border-0" placeholder="아이디 입력">
    </div>

    <!-- PW -->
    <div class="mb-4">
      <label class="form-label">Password</label>
      <input type="password" class="form-control bg-dark text-white border-0" placeholder="비밀번호 입력">
    </div>

    <!-- 버튼 -->
    <button class="btn btn-dark w-100">로그인</button>
  </div>

</body>
</html>
